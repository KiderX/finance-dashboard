<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הגדרה ראשונית — דשבורד פיננסי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .setup-page {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 60px;
      background: var(--bg);
    }
    .setup-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 540px;
    }
    .setup-logo { margin-bottom: 12px; }
    .setup-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin: 0 0 4px;
    }
    .setup-subtitle {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin: 0 0 32px;
    }
    .setup-section { margin-bottom: 24px; }
    .setup-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .setup-help {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.55;
    }
    .setup-help code {
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 0.74rem;
      direction: ltr;
      unicode-bidi: isolate;
      display: inline-block;
    }
    .setup-divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    #setup-error { margin-top: 12px; }
    @media (max-width: 480px) {
      .setup-page { padding: 28px 12px 40px; }
      .setup-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="setup-page">
    <div class="setup-card">

      <div class="setup-logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#F59E0B"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
      <h1 class="setup-title">הגדרה ראשונית</h1>
      <p class="setup-subtitle">ההגדרות נשמרות בדפדפן שלך בלבד — לא בקוד המקור</p>

      <!-- Spreadsheet -->
      <div class="setup-section">
        <div class="setup-label">קישור ל-Google Sheet</div>
        <input type="text" id="input-sheet-id" class="input" dir="ltr"
               placeholder="https://docs.google.com/spreadsheets/d/…/edit"
               style="width:100%;box-sizing:border-box;" />
        <p class="setup-help">הדבק את הקישור המלא לגיליון או רק את המזהה שבתוך ה-URL</p>
      </div>

      <!-- Client ID -->
      <div class="setup-section">
        <div class="setup-label">OAuth Client ID</div>
        <input type="text" id="input-client-id" class="input" dir="ltr"
               placeholder="123456789-abc.apps.googleusercontent.com"
               style="width:100%;box-sizing:border-box;" />
        <p class="setup-help">
          Google Cloud Console ← Credentials ← OAuth 2.0 Client IDs ← Web application
        </p>
      </div>

      <div id="setup-error"></div>

      <button class="btn btn-primary w-full" id="save-btn" style="padding:14px;font-size:1rem;">
        שמור והתחל
      </button>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    'use strict';

    // ── Invite link: auto-apply and skip setup ────────────────────────────────
    const hash = window.location.hash;
    if (hash.startsWith('#invite=')) {
      try {
        const cfg = JSON.parse(atob(hash.slice(8)));
        saveConfig({
          spreadsheetId: cfg.spreadsheetId,
          clientId:      cfg.clientId,
        });
        window.location.href = 'index.html';
      } catch (_) {
        // Malformed invite — fall through to manual setup
        window.location.hash = '';
      }
    }

    // ── If already configured, skip to login ─────────────────────────────────
    if (isConfigured()) {
      window.location.href = 'index.html';
    }

    // ── Save ──────────────────────────────────────────────────────────────────
    document.getElementById('save-btn').addEventListener('click', () => {
      const errorEl      = document.getElementById('setup-error');
      errorEl.innerHTML  = '';

      const rawSheet = document.getElementById('input-sheet-id').value.trim();
      const clientId = document.getElementById('input-client-id').value.trim();

      // Accept full URL or bare ID
      const urlMatch      = rawSheet.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
      const spreadsheetId = urlMatch ? urlMatch[1] : rawSheet;

      if (!spreadsheetId) {
        errorEl.innerHTML = '<div class="error-msg">יש להזין קישור לגיליון</div>'; return;
      }
      if (!clientId) {
        errorEl.innerHTML = '<div class="error-msg">יש להזין OAuth Client ID</div>'; return;
      }

      saveConfig({ spreadsheetId, clientId });
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שווי נקי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span class="logo-text">איזור אישי</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
        דשבורד חודשי
      </a>
      <a href="yearly.html" class="nav-item">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        סיכום שנתי
      </a>
      <a href="upload.html" class="nav-item write-only">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg></span>
        העלאת נתונים
      </a>
      <a href="espp.html" class="nav-item">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span>
        ESPP
      </a>
      <a href="networth.html" class="nav-item active">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12V7l8 8 8-8v5"/><path d="M2 7l10 10L22 7"/></svg></span>
        שווי נקי
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info" id="user-email"></div>
      <div class="d-flex gap-8">
        <button class="btn btn-outline" style="flex:1;" onclick="AuthManager.signOut()">יציאה</button>
        <button class="btn btn-outline" id="settings-btn" title="הגדרות" style="padding:8px 12px;" aria-label="הגדרות">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="d-flex align-center gap-12">
        <button class="hamburger" id="hamburger" aria-label="תפריט">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-title">מעקב שווי נקי</h1>
      </div>
      <button class="btn btn-success write-only" id="toggle-form-btn">+ עדכן חודש</button>
    </div>

    <!-- Entry form -->
    <div class="card write-only hidden" id="add-form">
      <div class="card-title">רישום שווי נקי חודשי</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;">
        <div class="form-group">
          <label>חודש (MM/YYYY)</label>
          <input type="text" id="nw-month" placeholder="MM/YYYY" />
        </div>
        <div class="form-group">
          <label>תיק השקעות (₪)</label>
          <input type="number" id="nw-portfolio" step="1" placeholder="0" />
        </div>
        <div class="form-group">
          <label>קרן כספית (₪)</label>
          <input type="number" id="nw-cashfund" step="1" placeholder="0" />
        </div>
        <div class="form-group">
          <label>חסכונות (₪)</label>
          <input type="number" id="nw-savings" step="1" placeholder="0" />
        </div>
      </div>
      <div class="d-flex gap-12 mt-16" style="align-items:center;">
        <button class="btn btn-success" id="save-nw-btn">שמור</button>
        <button class="btn btn-outline" id="cancel-form-btn">ביטול</button>
        <span id="nw-save-msg"></span>
      </div>
    </div>

    <div id="loading" class="loading"><div class="spinner"></div><span>טוען נתונים...</span></div>
    <div id="error-container"></div>

    <div id="content" class="hidden">
      <!-- Latest snapshot stats -->
      <div class="stats-grid" id="nw-stats"></div>

      <div class="dashboard-grid">
        <!-- Total net worth line -->
        <div class="card">
          <div class="card-title">שווי נקי כולל לאורך זמן</div>
          <div class="chart-legend-row">
            <div class="donut-legend-item">
              <span class="donut-legend-dot" style="background:#10B981;box-shadow:0 0 6px 2px #10B98188;"></span>
              <span class="donut-legend-name">שווי נקי כולל</span>
            </div>
          </div>
          <div class="chart-container-lg"><canvas id="nw-total-chart"></canvas></div>
        </div>

        <!-- Breakdown stacked area -->
        <div class="card">
          <div class="card-title">פירוט לפי נכס</div>
          <div class="chart-legend-row">
            <div class="donut-legend-item">
              <span class="donut-legend-dot" style="background:#0EA5E9;box-shadow:0 0 6px 2px #0EA5E988;"></span>
              <span class="donut-legend-name">תיק השקעות</span>
            </div>
            <div class="donut-legend-item">
              <span class="donut-legend-dot" style="background:#10B981;box-shadow:0 0 6px 2px #10B98188;"></span>
              <span class="donut-legend-name">קרן כספית</span>
            </div>
            <div class="donut-legend-item">
              <span class="donut-legend-dot" style="background:#8B5CF6;box-shadow:0 0 6px 2px #8B5CF688;"></span>
              <span class="donut-legend-name">חסכונות</span>
            </div>
          </div>
          <div class="chart-container-lg"><canvas id="nw-breakdown-chart"></canvas></div>
        </div>
      </div>

      <!-- History table -->
      <div class="card" style="margin-top:32px;">
        <div class="card-title">היסטוריה</div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>חודש</th><th>תיק השקעות</th><th>קרן כספית</th>
                <th>חסכונות</th><th>סה"כ שווי נקי</th><th class="write-only"></th>
              </tr>
            </thead>
            <tbody id="nw-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/sheets.js"></script>
<script src="js/charts.js"></script>
<script>
'use strict';

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadNetWorth() {
  const loading = document.getElementById('loading');
  const content = document.getElementById('content');
  const errorContainer = document.getElementById('error-container');
  loading.classList.remove('hidden');
  content.classList.add('hidden');
  errorContainer.innerHTML = '';

  try {
    const data = await SheetsAPI.getSheet(CONFIG.SHEETS.NET_WORTH);
    // Columns: חודש | תיק השקעות | קרן כספית | חסכונות | סה"כ שווי נקי
    const rows = data.length > 1 ? data.slice(1) : [];

    // Sum across all months for cumulative totals
    const totalPortfolio = rows.reduce((s, r) => s + parseFloat(r[1] || 0), 0);
    const totalCash      = rows.reduce((s, r) => s + parseFloat(r[2] || 0), 0);
    const totalSavings   = rows.reduce((s, r) => s + parseFloat(r[3] || 0), 0);
    const grandTotal     = rows.reduce((s, r) => {
      const t = parseFloat(r[4] || 0);
      return s + (t || parseFloat(r[1] || 0) + parseFloat(r[2] || 0) + parseFloat(r[3] || 0));
    }, 0);

    document.getElementById('nw-stats').innerHTML = `
      <div class="card" style="margin-bottom:0;"><div class="card-title">תיק השקעות</div><div class="card-value accent">${formatShekel(totalPortfolio)}</div></div>
      <div class="card" style="margin-bottom:0;"><div class="card-title">קרן כספית</div><div class="card-value accent">${formatShekel(totalCash)}</div></div>
      <div class="card" style="margin-bottom:0;"><div class="card-title">חסכונות</div><div class="card-value accent">${formatShekel(totalSavings)}</div></div>
      <div class="card" style="margin-bottom:0;"><div class="card-title">סה"כ שווי נקי</div><div class="card-value income">${formatShekel(grandTotal)}</div></div>
    `;

    const months    = rows.map(r => r[0] || '');
    const portfolio = rows.map(r => parseFloat(r[1] || 0));
    const cashFund  = rows.map(r => parseFloat(r[2] || 0));
    const savings   = rows.map(r => parseFloat(r[3] || 0));
    const totals    = rows.map((r, i) => parseFloat(r[4] || 0) || portfolio[i] + cashFund[i] + savings[i]);

    if (months.length > 0) {
      renderNetWorthLine('nw-total-chart', months, totals);
      renderNetWorthStackedArea('nw-breakdown-chart', months, portfolio, cashFund, savings);
    }

    // Table
    const tbody = document.getElementById('nw-tbody');
    tbody.innerHTML = '';
    rows.forEach((r, i) => {
      const tr = document.createElement('tr');
      tr.dataset.sheetRow = i + 1; // 0-indexed for Google Sheets batchUpdate
      tr.innerHTML = `
        <td>${escHtml(r[0]||'')}</td>
        <td class="amount-positive">${formatShekel(portfolio[i])}</td>
        <td class="amount-positive">${formatShekel(cashFund[i])}</td>
        <td class="amount-positive">${formatShekel(savings[i])}</td>
        <td class="amount-positive" style="font-weight:700;">${formatShekel(totals[i])}</td>
        <td class="write-only"><button class="btn btn-sm btn-outline-danger delete-nw-btn">מחק</button></td>`;
      tbody.appendChild(tr);
    });

    loading.classList.add('hidden');
    content.classList.remove('hidden');
  } catch (err) {
    loading.classList.add('hidden');
    errorContainer.innerHTML = `<div class="error-msg">${err.message}</div>`;
  }
}

async function saveNetWorth() {
  const btn = document.getElementById('save-nw-btn');
  const msg = document.getElementById('nw-save-msg');
  btn.disabled = true;
  btn.textContent = 'שומר...';

  const month     = document.getElementById('nw-month').value.trim();
  const portfolio = parseFloat(document.getElementById('nw-portfolio').value || 0);
  const cashFund  = parseFloat(document.getElementById('nw-cashfund').value || 0);
  const savings   = parseFloat(document.getElementById('nw-savings').value || 0);

  if (!month || !/^\d{2}\/\d{4}$/.test(month)) {
    msg.innerHTML = '<span class="text-danger">יש להזין חודש בפורמט MM/YYYY</span>';
    btn.disabled = false; btn.textContent = 'שמור';
    return;
  }

  const total = portfolio + cashFund + savings;

  try {
    // Check if month exists and update, otherwise append
    const existing = await SheetsAPI.getSheet(CONFIG.SHEETS.NET_WORTH);
    const rowNum = SheetsAPI.findMonthRow(existing, month);
    const rowData = [month, portfolio, cashFund, savings, total];

    if (rowNum === -1) {
      await SheetsAPI.appendRows(CONFIG.SHEETS.NET_WORTH, [rowData]);
    } else {
      await SheetsAPI.updateRange(CONFIG.SHEETS.NET_WORTH, `A${rowNum}:E${rowNum}`, [rowData]);
    }

    msg.innerHTML = '<span class="text-success">נשמר ✓</span>';
    setTimeout(() => { msg.innerHTML = ''; }, 3000);
    document.getElementById('add-form').classList.add('hidden');
    await loadNetWorth();
  } catch (err) {
    msg.innerHTML = `<span class="text-danger">${err.message}</span>`;
  } finally {
    btn.disabled = false; btn.textContent = 'שמור';
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('hamburger').addEventListener('click', () =>
    document.getElementById('sidebar').classList.toggle('open'));

  const email = await AuthManager.init();
  if (!email) return;
  document.getElementById('user-email').textContent = email;

  // Pre-fill current month
  const now = new Date();
  document.getElementById('nw-month').value =
    `${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;

  document.getElementById('toggle-form-btn').addEventListener('click', () =>
    document.getElementById('add-form').classList.toggle('hidden'));
  document.getElementById('cancel-form-btn').addEventListener('click', () =>
    document.getElementById('add-form').classList.add('hidden'));
  document.getElementById('save-nw-btn').addEventListener('click', saveNetWorth);

  // Delete net worth row — event delegation so it survives table re-renders
  document.getElementById('nw-tbody').addEventListener('click', async e => {
    const btn = e.target.closest('.delete-nw-btn');
    if (!btn || btn.disabled) return;
    const tr = btn.closest('tr');
    if (!tr) return;
    const rowNum = parseInt(tr.dataset.sheetRow);
    if (isNaN(rowNum)) return;
    btn.disabled = true;
    btn.textContent = '...';
    try {
      await SheetsAPI.deleteRow(CONFIG.SHEETS.NET_WORTH, rowNum);
      await loadNetWorth();
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'מחק';
      const errEl = document.createElement('div');
      errEl.className = 'text-danger';
      errEl.style.cssText = 'font-size:0.72rem;margin-top:4px;';
      errEl.textContent = err.message;
      btn.parentElement.appendChild(errEl);
    }
  });

  await loadNetWorth();
});
</script>
</body>
</html>

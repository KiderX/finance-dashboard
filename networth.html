  <main class="main-content">
    <div class="page-header">
      <div class="d-flex align-center gap-12">
        <button class="hamburger" id="hamburger" aria-label="תפריט">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-title">מעקב שווי נקי</h1>
      </div>
      <button class="btn btn-success write-only" id="toggle-form-btn">+ עדכן חודש</button>
    </div>

    <!-- Entry form -->
    <div class="card write-only hidden" id="add-form">
      <div class="card-title">הוספה ידנית לחודש</div>
      <p class="text-muted" style="font-size:0.83rem;margin-bottom:12px;">
        הסכומים מתווספים לחישוב האוטומטי מפיזור הרווחים — לא מחליפים אותו.
      </p>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;">
        <div class="form-group">
          <label>חודש</label>
          <input type="month" id="nw-month" />
        </div>
        <div class="form-group">
          <label>תיק השקעות — הוספה ידנית (₪)</label>
          <input type="number" id="nw-portfolio" step="1" placeholder="0" />
        </div>
        <div class="form-group">
          <label>קרן כספית — הוספה ידנית (₪)</label>
          <input type="number" id="nw-cashfund" step="1" placeholder="0" />
        </div>
        <div class="form-group">
          <label>חסכונות — הוספה ידנית (₪)</label>
          <input type="number" id="nw-savings" step="1" placeholder="0" />
        </div>
      </div>
      <div class="d-flex gap-12 mt-16" style="align-items:center;">
        <button class="btn btn-success" id="save-nw-btn">שמור</button>
        <button class="btn btn-outline" id="cancel-form-btn">ביטול</button>
        <span id="nw-save-msg"></span>
      </div>
    </div>

    <div id="loading" class="loading"><div class="spinner"></div><span>טוען נתונים...</span></div>
    <div id="error-container"></div>

    <div id="content" class="hidden">
      <!-- Latest snapshot stats -->
      <div class="stats-grid" id="nw-stats"></div>

      <div class="dashboard-grid">
        <!-- Total net worth line -->
        <div class="card">
          <div class="card-title">שווי נקי כולל לאורך זמן</div>
          <div class="chart-legend-row">
            <div class="donut-legend-item">
              <span class="donut-legend-dot" style="background:#10B981;box-shadow:0 0 6px 2px #10B98188;"></span>
              <span class="donut-legend-name">שווי נקי כולל</span>
            </div>
          </div>
          <div class="chart-container-lg"><canvas id="nw-total-chart"></canvas></div>
        </div>

        <!-- Breakdown stacked area -->
        <div class="card">
          <div class="card-title">פירוט לפי נכס</div>
          <div class="chart-legend-row" id="nw-breakdown-legend">
            <div class="donut-legend-item legend-toggle" data-dataset="0" role="button" tabindex="0" aria-pressed="true">
              <span class="donut-legend-dot" style="background:#0EA5E9;box-shadow:0 0 6px 2px #0EA5E988;"></span>
              <span class="donut-legend-name">תיק השקעות</span>
            </div>
            <div class="donut-legend-item legend-toggle" data-dataset="1" role="button" tabindex="0" aria-pressed="true">
              <span class="donut-legend-dot" style="background:#10B981;box-shadow:0 0 6px 2px #10B98188;"></span>
              <span class="donut-legend-name">קרן כספית</span>
            </div>
            <div class="donut-legend-item legend-toggle" data-dataset="2" role="button" tabindex="0" aria-pressed="true">
              <span class="donut-legend-dot" style="background:#8B5CF6;box-shadow:0 0 6px 2px #8B5CF688;"></span>
              <span class="donut-legend-name">חסכונות</span>
            </div>
          </div>
          <div class="chart-container-lg"><canvas id="nw-breakdown-chart"></canvas></div>
        </div>
      </div>

      <!-- History table -->
      <div class="card" style="margin-top:32px;">
        <div class="card-title">היסטוריה</div>
        <div class="table-wrapper">
          <table class="rwd-table">
            <thead>
              <tr>
                <th>חודש</th><th>תיק השקעות</th><th>קרן כספית</th>
                <th>חסכונות</th><th>ערך</th><th class="write-only"></th>
              </tr>
            </thead>
            <tbody id="nw-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/sheets.js"></script>
<script src="js/charts.js"></script>
<script>
'use strict';

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parseMonth(monthStr) {
  const [mm, yyyy] = (monthStr || '').split('/').map(Number);
  return new Date(yyyy, mm - 1, 1).getTime();
}

let breakdownChart = null;

async function loadNetWorth() {
  const loading        = document.getElementById('loading');
  const content        = document.getElementById('content');
  const errorContainer = document.getElementById('error-container');
  loading.classList.remove('hidden');
  content.classList.add('hidden');
  errorContainer.innerHTML = '';

  try {
    // Fetch Allocation and NetWorth sheets in parallel
    const [allocData, nwData] = await Promise.all([
      SheetsAPI.getSheet(CONFIG.SHEETS.PROFIT_ALLOCATION),
      SheetsAPI.getSheet(CONFIG.SHEETS.NET_WORTH),
    ]);

    // Allocation cols: חודש(0) | רווח(1) | עו"ש(2)→חסכונות | קרן כספית(3) | השקעות(4)→תיק השקעות
    const allocRows = (allocData.length > 1 ? allocData.slice(1) : [])
      .filter(r => r[0]);

    // Manual overrides from NetWorth sheet: { month → { portfolio, cashFund, savings, total, sheetRow } }
    const manualMap = {};
    if (nwData.length > 1) {
      nwData.slice(1).forEach((r, i) => {
        if (!r[0]) return;
        const p = parseFloat(r[1] || 0);
        const c = parseFloat(r[2] || 0);
        const s = parseFloat(r[3] || 0);
        manualMap[r[0]] = {
          portfolio: p, cashFund: c, savings: s,
          total: parseFloat(r[4] || 0) || p + c + s,
          sheetRow: i + 1, // 0-based for deleteDimension API (header=0, first data row=1)
        };
      });
    }

    // Build sorted unique month list (from both sources)
    const allMonths = [...new Set([
      ...allocRows.map(r => r[0]),
      ...Object.keys(manualMap),
    ])].sort((a, b) => parseMonth(a) - parseMonth(b));

    // Calculate running cumulative from Allocation additions
    const allocByMonth = {};
    allocRows.forEach(r => {
      allocByMonth[r[0]] = {
        investments: parseFloat(r[4] || 0), // השקעות → תיק השקעות
        cashFund:    parseFloat(r[3] || 0), // קרן כספית
        savings:     parseFloat(r[2] || 0), // עו"ש → חסכונות
      };
    });

    // Both allocation and manual entries are ADDITIVE — neither overrides the other.
    // historyRows: one entry per source per month (for the table).
    // chartPoints: one entry per month with combined cumulative (for charts & stat cards).
    let cumPortfolio = 0, cumCashFund = 0, cumSavings = 0;
    const historyRows  = [];
    const chartPoints  = [];

    allMonths.forEach(month => {
      const add    = allocByMonth[month];
      const manual = manualMap[month];

      if (add) {
        cumPortfolio += add.investments;
        cumCashFund  += add.cashFund;
        cumSavings   += add.savings;
        // Only add a history row if the allocation contributed something non-zero
        if (add.investments || add.cashFund || add.savings) {
          historyRows.push({
            month,
            portfolio: add.investments,
            cashFund:  add.cashFund,
            savings:   add.savings,
            total:     add.investments + add.cashFund + add.savings,
            source:    'auto',
            sheetRow:  null,
          });
        }
      }
      if (manual) {
        // Manual entry is a point-in-time SNAPSHOT, not an increment.
        // Non-zero fields set the running cumulative; zero fields carry forward unchanged.
        if (manual.portfolio) cumPortfolio = manual.portfolio;
        if (manual.cashFund)  cumCashFund  = manual.cashFund;
        if (manual.savings)   cumSavings   = manual.savings;
        historyRows.push({
          month,
          portfolio: manual.portfolio,
          cashFund:  manual.cashFund,
          savings:   manual.savings,
          total:     manual.portfolio + manual.cashFund + manual.savings,
          source:    'manual',
          sheetRow:  manual.sheetRow,
        });
      }

      if (add || manual) {
        chartPoints.push({
          month,
          portfolio: cumPortfolio,
          cashFund:  cumCashFund,
          savings:   cumSavings,
          total:     cumPortfolio + cumCashFund + cumSavings,
        });
      }
    });

    // Stat cards — final cumulative values
    document.getElementById('nw-stats').innerHTML = `
      <div class="card" style="margin-bottom:0;"><div class="card-title">תיק השקעות</div><div class="card-value accent">${formatShekel(cumPortfolio)}</div></div>
      <div class="card" style="margin-bottom:0;"><div class="card-title">קרן כספית</div><div class="card-value accent">${formatShekel(cumCashFund)}</div></div>
      <div class="card" style="margin-bottom:0;"><div class="card-title">חסכונות</div><div class="card-value accent">${formatShekel(cumSavings)}</div></div>
      <div class="card" style="margin-bottom:0;"><div class="card-title">סה"כ שווי נקי</div><div class="card-value income">${formatShekel(cumPortfolio + cumCashFund + cumSavings)}</div></div>
    `;

    // Charts — use combined cumulative points (one per month)
    if (chartPoints.length > 0) {
      renderNetWorthLine('nw-total-chart', chartPoints.map(x => x.month), chartPoints.map(x => x.total));
      breakdownChart = renderNetWorthStackedArea('nw-breakdown-chart',
        chartPoints.map(x => x.month),
        chartPoints.map(x => x.portfolio),
        chartPoints.map(x => x.cashFund),
        chartPoints.map(x => x.savings)
      );
      // Re-creating the chart resets dataset visibility — mirror current legend on/off state onto it.
      document.querySelectorAll('#nw-breakdown-legend .legend-toggle').forEach((btn) => {
        const idx = Number(btn.dataset.dataset);
        breakdownChart.getDatasetMeta(idx).hidden = btn.classList.contains('is-off');
      });
      breakdownChart.update();
    }

    // History table — one row per source per month (auto and manual are separate rows)
    const tbody = document.getElementById('nw-tbody');
    tbody.innerHTML = '';
    const SOURCE_BADGE = {
      auto:   `<span style="font-size:0.68rem;background:var(--primary);color:#ecf0f1;padding:1px 6px;border-radius:3px;vertical-align:middle;">אוטומטי</span>`,
      manual: `<span style="font-size:0.68rem;background:var(--accent);color:#000;padding:1px 6px;border-radius:3px;font-weight:600;vertical-align:middle;">ידני</span>`,
    };

    historyRows.forEach(item => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td data-label="חודש" style="white-space:nowrap;">${escHtml(item.month)}
          <span style="margin-right:6px;">${SOURCE_BADGE[item.source] || ''}</span>
        </td>
        <td data-label="תיק השקעות" class="amount-positive">${formatShekel(item.portfolio)}</td>
        <td data-label="קרן כספית" class="amount-positive">${formatShekel(item.cashFund)}</td>
        <td data-label="חסכונות" class="amount-positive">${formatShekel(item.savings)}</td>
        <td data-label="ערך" class="amount-positive" style="font-weight:700;">${formatShekel(item.total)}</td>
        <td class="write-only">${item.source === 'manual'
          ? `<button class="btn btn-sm btn-outline-danger delete-nw-btn" title="מחק רישום ידני" data-nw-row="${item.sheetRow}">מחק</button>`
          : ''}</td>`;
      tbody.appendChild(tr);
    });

    loading.classList.add('hidden');
    content.classList.remove('hidden');
  } catch (err) {
    loading.classList.add('hidden');
    errorContainer.innerHTML = `<div class="error-msg">${err.message}</div>`;
  }
}

async function saveNetWorth() {
  const btn = document.getElementById('save-nw-btn');
  const msg = document.getElementById('nw-save-msg');
  btn.disabled = true;
  btn.textContent = 'שומר...';

  const monthRaw  = document.getElementById('nw-month').value.trim(); // YYYY-MM from <input type="month">
  const portfolio = parseFloat(document.getElementById('nw-portfolio').value || 0);
  const cashFund  = parseFloat(document.getElementById('nw-cashfund').value || 0);
  const savings   = parseFloat(document.getElementById('nw-savings').value || 0);

  if (!monthRaw) {
    msg.innerHTML = '<span class="text-danger">יש לבחור חודש</span>';
    btn.disabled = false; btn.textContent = 'שמור';
    return;
  }
  const [my, mm] = monthRaw.split('-');
  const month = `${mm}/${my}`;

  const total = portfolio + cashFund + savings;

  try {
    // Check if month exists and update, otherwise append
    const existing = await SheetsAPI.getSheet(CONFIG.SHEETS.NET_WORTH);
    const rowNum = SheetsAPI.findMonthRow(existing, month);
    const rowData = [month, portfolio, cashFund, savings, total];

    if (rowNum === -1) {
      await SheetsAPI.appendRows(CONFIG.SHEETS.NET_WORTH, [rowData]);
    } else {
      await SheetsAPI.updateRange(CONFIG.SHEETS.NET_WORTH, `A${rowNum}:E${rowNum}`, [rowData]);
    }

    msg.innerHTML = '<span class="text-success">נשמר ✓</span>';
    setTimeout(() => { msg.innerHTML = ''; }, 3000);
    document.getElementById('add-form').classList.add('hidden');
    await loadNetWorth();
  } catch (err) {
    msg.innerHTML = `<span class="text-danger">${err.message}</span>`;
  } finally {
    btn.disabled = false; btn.textContent = 'שמור';
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('hamburger').addEventListener('click', () =>
    document.getElementById('sidebar').classList.toggle('open'));

  const email = await AuthManager.init();
  if (!email) return;
  document.getElementById('user-email').textContent = email;

  // Pre-fill current month
  const now = new Date();
  document.getElementById('nw-month').value =
    `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  document.getElementById('toggle-form-btn').addEventListener('click', () =>
    document.getElementById('add-form').classList.toggle('hidden'));
  document.getElementById('cancel-form-btn').addEventListener('click', () =>
    document.getElementById('add-form').classList.add('hidden'));
  document.getElementById('save-nw-btn').addEventListener('click', saveNetWorth);

  // Delete manual net worth override — event delegation so it survives table re-renders
  document.getElementById('nw-tbody').addEventListener('click', async e => {
    const btn = e.target.closest('.delete-nw-btn');
    if (!btn || btn.disabled) return;
    const rowNum = parseInt(btn.dataset.nwRow);
    if (isNaN(rowNum)) return;
    btn.disabled = true;
    btn.textContent = '...';
    try {
      await SheetsAPI.deleteRow(CONFIG.SHEETS.NET_WORTH, rowNum);
      await loadNetWorth();
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'מחק';
      const errEl = document.createElement('div');
      errEl.className = 'text-danger';
      errEl.style.cssText = 'font-size:0.72rem;margin-top:4px;';
      errEl.textContent = err.message;
      btn.parentElement.appendChild(errEl);
    }
  });

  // Breakdown chart legend — clickable glowing dots toggle the matching wave on/off.
  // Bound once on the static container; reads `breakdownChart` lazily so it always
  // controls whichever chart instance is currently rendered.
  const toggleLegendDataset = (btn) => {
    if (!breakdownChart) return;
    const idx  = Number(btn.dataset.dataset);
    const meta = breakdownChart.getDatasetMeta(idx);
    meta.hidden = !meta.hidden;
    btn.classList.toggle('is-off', meta.hidden);
    btn.setAttribute('aria-pressed', String(!meta.hidden));
    breakdownChart.update();
  };
  const breakdownLegend = document.getElementById('nw-breakdown-legend');
  breakdownLegend.addEventListener('click', (e) => {
    const btn = e.target.closest('.legend-toggle');
    if (btn) toggleLegendDataset(btn);
  });
  breakdownLegend.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const btn = e.target.closest('.legend-toggle');
    if (!btn) return;
    e.preventDefault();
    toggleLegendDataset(btn);
  });

  await loadNetWorth();
});
</script>
</body>
</html>
